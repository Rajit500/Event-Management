<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ITS CPS Events</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
        }

       .auth-logo {
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    color: #4F46E5;
    margin-bottom: 8px;
}

        .admin-badge {
            text-align: center;
            background: linear-gradient(135deg, #FFF1F2, #FECDD3);
            color: #BE123C;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin: 0 auto 25px;
            width: 100%;
        }

        .error-msg {
            background: #FFF1F2;
            color: #BE123C;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-logo">ITS CPS Events</div>
            <div class="admin-badge">🛠️ Teacher / Admin Portal</div>

            <div id="adminError" class="error-msg"></div>

            <div class="form-group">
                <label>Teacher Email</label>
                <input type="email" id="adminEmail"
                    placeholder="Enter your college email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword"
                    placeholder="Enter your password">
            </div>

            <button type="button" class="btn btn-primary"
                style="width:100%; margin-bottom:15px;" 
                onclick="adminLogin()">
                Login as Admin 🛠️
            </button>

            <p style="text-align:center; font-size:13px; color:var(--text-light);">
                First time? Contact principal office to get admin access.
            </p>

            <p style="text-align:center; font-size:13px; 
                      margin-top:15px; color:var(--text-light);">
                Are you a student? 
                <a href="login.html" 
                   style="color:#4F46E5; font-weight:600;">
                   Student Login
                </a>
            </p>

        </div>
    </div>

    <script src="js/app.js"></script>
    <script type="module" src="js/admin-login.js"></script>

</body>
</html>
