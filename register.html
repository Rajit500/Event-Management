<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Event</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">ITS<span>CPSEvents</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="announcements.html">News</a></li>
            <li><a href="my-events.html">My Events</a></li>
            <li><a href="bookmarks.html">Bookmarks</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
        <button class="dark-toggle" id="darkToggle">🌙</button>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- BACK BUTTON -->
        <a href="index.html" style="display:inline-block; margin-bottom:20px;
            color:var(--primary); font-weight:600; font-size:14px;">
            ← Back to Events
        </a>

        <!-- EVENT INFO BOX -->
        <div class="card" id="eventInfo" style="padding:20px; margin-bottom:25px;">
            <!-- Loaded by JS -->
        </div>

        <!-- REGISTRATION FORM -->
        <div class="card" style="padding:30px;">
            <h2 class="page-title">Register for Event</h2>
            <p class="page-subtitle">Fill in your details to register</p>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="studentName" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" id="rollNo" placeholder="Enter your roll number">
            </div>

            <div class="form-group">
                <label>Branch</label>
                <select id="branch">
                    <option value="">Select your branch</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="BCA">BCA</option>
                    <option value="BBA">BBA</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>

            <!-- COLLEGE NAME — for inter college events -->
<div class="form-group" id="collegeGroup" style="display:none;">
    <label>College Name</label>
    <input type="text" id="collegeName"
        placeholder="Enter your college name">
</div>

            <div class="form-group">
                <label>Year</label>
                <select id="year">
                    <option value="">Select your year</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter 10 digit phone number" minlength="10" maxlength="10">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <!-- ERROR MESSAGE -->
            <p id="errorMsg" style="color:red; font-size:13px; 
                margin-bottom:15px; display:none;">
                Please fill all fields!
            </p>

            <!-- SUBMIT BUTTON -->
            <button type="button" class="btn btn-primary"
                style="width:100%;" onclick="registerStudent()">
                Register Now 🎉
            </button>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Made with ❤️ for College Events Management</p>
    </footer>
 
    <script src="js/events.js"></script>
    <script src="js/app.js"></script>
    <script type="module" src="js/firestore-events.js"></script>
    <script src="js/register.js"></script>
    <script src="js/chatbot.js"></script>
      

</body>
</html>
