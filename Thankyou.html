<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to   { transform: translateY(-15px); }
        }

        .pass-card {
            background: linear-gradient(135deg, #6C63FF, #FF6584);
            border-radius: 16px;
            padding: 30px;
            color: white;
            margin: 30px 0;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .pass-card::before {
            content: '🎫';
            position: absolute;
            font-size: 120px;
            right: -20px;
            top: -20px;
            opacity: 0.1;
        }

        .pass-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .pass-label {
            opacity: 0.8;
        }

        .pass-value {
            font-weight: 600;
        }

        .pass-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">ITS<span>CPSEvents</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="announcements.html">News</a></li>
            <li><a href="my-events.html">My Events</a></li>
            <li><a href="bookmarks.html">Bookmarks</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
        <button class="dark-toggle" id="darkToggle">🌙</button>
    </nav>

    <!-- SUCCESS CONTENT -->
    <div class="success-container">

        <!-- SUCCESS ICON -->
        <div class="success-icon">🎉</div>

        <!-- SUCCESS MESSAGE -->
        <h1 style="font-size:28px; font-weight:700; 
                   color:var(--text); margin-bottom:10px;">
            Registration Successful!
        </h1>
        <p style="color:var(--text-light); font-size:15px; margin-bottom:10px;">
            You have successfully registered for the event.
        </p>

        <!-- EVENT PASS CARD -->
        <div class="pass-card" id="passCard">
            <!-- Loaded by JS -->
        </div>

        <!-- ACTION BUTTONS -->
        <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
            <button type="button" class="btn btn-primary" onclick="downloadPass()">
                📥 Download Pass
            </button>
            <a href="my-events.html" class="btn btn-outline">
                📋 My Events
            </a>
            <a href="index.html" class="btn btn-outline">
                🏠 Back to Home
            </a>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>Made with ❤️ for College Events Management</p>
    </footer>

    <script src="js/events.js"></script>
    <script src="js/app.js"></script>
    <script src="js/thankyou.js"></script>

</body>
</html>
